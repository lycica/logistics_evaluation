<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>管理员后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>管理员控制台</h1>
    <p>当前管理员：<span th:text="${session.currentUser.username}"></span></p>
    <a th:href="@{/user/logout}" class="btn btn-danger">退出</a>
    <hr>
    <div class="row">
        <div class="col-md-4"><a th:href="@{/admin/providers}" class="btn btn-outline-primary btn-lg w-100">管理物流服务商</a></div>
        <div class="col-md-4"><a th:href="@{/admin/users}" class="btn btn-outline-primary btn-lg w-100">管理用户</a></div>
        <div class="col-md-4"><a th:href="@{/admin/reviews}" class="btn btn-outline-primary btn-lg w-100">管理评价</a></div>
    </div>
    <!-- 放统计图表 -->
    <a th:href="@{/admin/statistics}" class="btn btn-primary">查看统计</a>
</div>
</body>
</html>
