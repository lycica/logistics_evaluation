<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>评价管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>📋 评价管理</h2>
<a th:href="@{/admin/dashboard}" class="btn btn-secondary mb-2">返回控制台</a>

<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>用户ID</th>
        <th>服务商ID</th>
        <th>时效性</th>
        <th>态度</th>
        <th>完好度</th>
        <th>价格</th>
        <th>内容</th>
        <th>时间</th>
        <th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${reviews}">
        <td th:text="${r.reviewId}">1</td>
        <td th:text="${r.userId}">1</td>
        <td th:text="${r.providerId}">1</td>
        <td th:text="${r.timelinessScore}"></td>
        <td th:text="${r.attitudeScore}"></td>
        <td th:text="${r.integrityScore}"></td>
        <td th:text="${r.priceScore}"></td>
        <td th:text="${#strings.abbreviate(r.commentText, 15)}"></td>
        <td th:text="${#temporals.format(r.createTime, 'yyyy-MM-dd HH:mm')}"></td>
        <td>
            <a th:href="@{/admin/reviews/delete/{id}(id=${r.reviewId})}" class="btn btn-sm btn-danger"
               onclick="return confirm('确定删除该评价？')">删除</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
