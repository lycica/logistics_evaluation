<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>数据统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script th:src="@{/js/echarts.min.js}"></script>
</head>
<body class="container-fluid mt-4">
<h2>📊 数据统计</h2>
<div class="row">
    <div class="col-md-3"><div class="card bg-primary text-white"><div class="card-body"><h5>总评价数</h5><h3 th:text="${totalReviews}">0</h3></div></div></div>
    <div class="col-md-3"><div class="card bg-success text-white"><div class="card-body"><h5>参与用户数</h5><h3 th:text="${totalUsers}">0</h3></div></div></div>
    <div class="col-md-3"><div class="card bg-info text-white"><div class="card-body"><h5>服务商数</h5><h3 th:text="${totalProviders}">0</h3></div></div></div>
    <div class="col-md-3"><div class="card bg-warning"><div class="card-body"><h5>整体平均分</h5><h3 th:text="${overallAvg}">0</h3></div></div></div>
</div>
<div class="card mt-4">
    <div class="card-header">服务商评分对比</div>
</div>
<div class="card-body">
    <div id="chart" style="width: 100%; height: 500px;"></div>
</div>
<script th:src="@{/js/echarts.min.js}"></script>
<script th:inline="javascript">
    // 1. 通过内联注入 JSON 字符串，再解析为对象（更安全）
    var scoresStr = /*[[${scoresJson}]]*/ '{}';
    var namesStr  = /*[[${namesJson}]]*/ '{}';
    var scores = JSON.parse(scoresStr);
    var names  = JSON.parse(namesStr);
    console.log('Parsed scores:', scores);
    console.log('Parsed names:', names);

    // 2. 检查数据
    if (Object.keys(scores).length === 0) {
        console.warn('无评分数据，图表将不显示柱形');
    }

    // 3. 准备数据
    var providers = Object.keys(scores);
    var xData = providers.map(function(id) {
        return names[id] || ('服务商 ' + id);
    });
    var overallData    = providers.map(id => (scores[id].overall    || 0).toFixed(2));
    var timelinessData = providers.map(id => (scores[id].timeliness || 0).toFixed(2));
    var attitudeData   = providers.map(id => (scores[id].attitude   || 0).toFixed(2));
    var integrityData  = providers.map(id => (scores[id].integrity  || 0).toFixed(2));
    var priceData      = providers.map(id => (scores[id].price      || 0).toFixed(2));

    // 4. 初始化图表
    window.addEventListener('load', function() {
        var chartDom = document.getElementById('chart');
        if (!chartDom) return;
        chartDom.style.width = '100%';
        chartDom.style.height = '500px';
        var myChart = echarts.init(chartDom);
        myChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['综合', '时效性', '服务态度', '包裹完好度', '价格'] },
            xAxis: { type: 'category', data: xData, axisLabel: { rotate: 30 } },
            yAxis: { type: 'value', max: 100 },
            series: [
                { name: '综合', type: 'bar', data: overallData },
                { name: '时效性', type: 'bar', data: timelinessData },
                { name: '服务态度', type: 'bar', data: attitudeData },
                { name: '包裹完好度', type: 'bar', data: integrityData },
                { name: '价格', type: 'bar', data: priceData }
            ]
        });
        window.onresize = () => myChart.resize();
    });
</script>
</body>
</html>
