<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="container mt-4">
<h2>👥 用户管理</h2>
<a th:href="@{/admin/dashboard}" class="btn btn-secondary mb-2">返回控制台</a>

<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<!-- 搜索栏 -->
<form class="row g-2 mb-3" th:action="@{/admin/users}" method="get">
    <div class="col-auto">
        <input type="text" name="keyword" class="form-control" placeholder="按用户名搜索" th:value="${keyword}">
    </div>
    <div class="col-auto">
        <button class="btn btn-primary" type="submit">搜索</button>
        <a th:href="@{/admin/users}" class="btn btn-outline-secondary">清除</a>
    </div>
</form>

<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>用户名</th>
        <th>邮箱</th>
        <th>角色</th>
        <th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${users}">
        <td th:text="${u.userId}">1</td>
        <td th:text="${u.username}">test</td>
        <td th:text="${u.email}">test@a.com</td>
        <td><span th:classappend="${u.role == 'admin' ? 'badge bg-danger' : 'badge bg-primary'}" th:text="${u.role}"></span></td>
        <td>
            <!-- 不能删除自己（可选判断） -->
            <a th:href="@{/admin/users/delete/{id}(id=${u.userId})}" class="btn btn-sm btn-danger"
               onclick="return confirm('确定删除此用户吗？')"
               th:if="${session.currentUser.userId != u.userId}">删除</a>
            <span th:if="${session.currentUser.userId == u.userId}" class="text-muted">当前用户</span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
