<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>我的评价</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>📝 我的评价</h2>
<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<table class="table" th:if="${not #lists.isEmpty(reviews)}">
    <thead>
    <tr>
        <th>服务商</th>
        <th>时效性</th>
        <th>态度</th>
        <th>完好度</th>
        <th>价格</th>
        <th>评论</th>
        <th>时间</th>
        <th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${reviews}">
        <td th:text="${r.providerId}">需要补服务商名称</td>
        <td th:text="${r.timelinessScore}"></td>
        <td th:text="${r.attitudeScore}"></td>
        <td th:text="${r.integrityScore}"></td>
        <td th:text="${r.priceScore}"></td>
        <td th:text="${#strings.abbreviate(r.commentText, 20)}"></td>
        <td th:text="${#temporals.format(r.createTime, 'yyyy-MM-dd HH:mm')}"></td>
        <td>
            <a th:href="@{/reviews/edit/{id}(id=${r.reviewId})}" class="btn btn-sm btn-warning">修改</a>
            <a th:href="@{/reviews/delete/{id}(id=${r.reviewId})}" class="btn btn-sm btn-danger"
               onclick="return confirm('确定删除？')">删除</a>
        </td>
    </tr>
    </tbody>
</table>
<div th:if="${#lists.isEmpty(reviews)}">
    <p>暂无评价记录。</p>
</div>
<a th:href="@{/}" class="btn btn-link">返回首页</a>
</body>
</html>
