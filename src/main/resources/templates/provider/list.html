<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>服务商列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>🚚 所有物流服务商</h2>
<a th:href="@{/}" class="btn btn-secondary mb-3">返回首页</a>

<div th:if="${#lists.isEmpty(providers)}" class="alert alert-warning">暂无服务商数据</div>

<div class="row">
    <div class="col-md-4 mb-3" th:each="p : ${providers}">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title" th:text="${p.name}">物流名称</h5>
                <p class="card-text">
                    综合评分：<span th:text="${p.avgScore}">0.00</span><br>
                    评价数：<span th:text="${p.reviewCount}">0</span><br>
                    联系方式：<span th:text="${p.contact}">无</span>
                </p>
            </div>
            <div class="card-footer">
                <a th:href="@{/providers/{id}(id=${p.providerId})}" class="btn btn-primary btn-sm">查看详情</a>
                <a th:href="@{/reviews/write/{id}(id=${p.providerId})}" class="btn btn-success btn-sm">立即评价</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
