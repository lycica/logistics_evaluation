<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>我的收藏</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body class="container mt-4">
<h2>⭐ 我的收藏</h2>
<a th:href="@{/}" class="btn btn-secondary mb-3">返回首页</a>
<div th:if="${#lists.isEmpty(favorites)}" class="alert alert-info">暂无收藏</div>
<div class="row">
    <div class="col-md-4 mb-3" th:each="p : ${favorites}">
        <div class="card">
            <div class="card-body">
                <h5 th:text="${p.name}"></h5>
                <p>评分：<span th:text="${p.avgScore}"></span></p>
                <a th:href="@{/providers/{id}(id=${p.providerId})}" class="btn btn-sm btn-primary">查看详情</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
